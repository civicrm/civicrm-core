<textarea class="form-control" rows=5 placeholder="{{:: ts('Description (shown above default display)') }}" ng-model="$ctrl.savedSearch.description"></textarea>
<div class="form-group">
  <label class="sr-only" for="expires_date">{{:: ts('Search Expiry Date') }}</label>
  <div class="input-group">
    <div class="input-group-addon"><i class="crm-i fa-calendar-times-o" role="img" aria-hidden="true"></i></div>
    <input id="expires_date" class="form-control" crm-ui-datepicker="{time: true}" ng-model="$ctrl.savedSearch.expires_date" placeholder="{{:: ts('Expires') }}">
  </div>
</div>
<crm-search-admin-tags tag-ids="$ctrl.savedSearch.tag_id" class="btn-group btn-group-sm"></crm-search-admin-tags>
<div class="form-group crm-search-admin-flex-row" title="{{:: ts('Maximum seconds this search may run. Leave blank to use the site default. Enter 0 to disable the timeout for this search.') }}">
  <label for="crm-search-admin-timeout">{{:: ts('Query Timeout (seconds)') }}</label>
  <input id="crm-search-admin-timeout" type="number" min="0" class="form-control" ng-model="$ctrl.savedSearch.timeout" placeholder="{{:: ts('Site default') }}">
</div>
