<div class="alert alert-warning" ng-show="!$ctrl.smartGroupColumns.length">
  {{:: ts('Unable to create smart group because this search does not include any contacts.') }}
</div>

<div class="form-inline">
  <label for="crm-search-admin-group-title">{{:: ts('Group Title') }} <span class="crm-marker">*</span></label>
  <input id="crm-search-admin-group-title" class="form-control" placeholder="{{:: ts('Untitled') }}" ng-model="$ctrl.smartGroup.title" ng-disabled="!$ctrl.smartGroupColumns.length" ng-required="$ctrl.smartGroupColumns.length">
  <label for="api-save-search-select-column">{{:: ts('Contact Column') }}</label>
  <input id="api-save-search-select-column" ng-model="$ctrl.savedSearch.api_params.select[0]" class="form-control" crm-ui-select="{data: $ctrl.smartGroupColumns}"/>
</div>
<fieldset ng-show="$ctrl.smartGroupColumns.length">
  <label>{{:: $ctrl.getField('description', 'Group').label }}</label>
  <textarea class="form-control" ng-model="$ctrl.smartGroup.description"></textarea>
  <div ng-if="$ctrl.getEntity('Group').optionsLoaded">
    <div class="form-inline">
      <label>{{:: $ctrl.getField('group_type', 'Group').label }}</label>
      <div class="checkbox" ng-repeat="option in $ctrl.getField('group_type', 'Group').options">&nbsp;
        <label>
          <input type="checkbox" checklist-model="$ctrl.smartGroup.group_type" checklist-value="option.id">
          {{:: option.label }}
        </label>&nbsp;
      </div>
    </div>
    <div class="form-inline">
      <crm-search-input field=":: $ctrl.getField('visibility', 'Group')" show-label="true" ng-model="$ctrl.smartGroup.visibility"></crm-search-input>
    </div>
    <hr>
    <div class="form-inline" ng-repeat="field in $ctrl.getEntity('Group').fields | filter:{name: '.', entity: 'Group'}">
      <crm-search-input field="field" ng-model="$ctrl.smartGroup[field.name]" show-label="true"></crm-search-input>
    </div>
  </div>
  <div ng-if="!$ctrl.getEntity('Group').optionsLoaded">
    <i class="crm-i fa-spinner fa-spin" role="img" aria-hidden="true"></i>
  </div>
</fieldset>
