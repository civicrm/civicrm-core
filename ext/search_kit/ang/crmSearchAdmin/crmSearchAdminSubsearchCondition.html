<select class="form-control crm-search-input-mode crm-auto-width" crm-ui-select ng-model="$ctrl.inputMode" ng-change="$ctrl.changeInputMode()" >
  <option value="value">{{:: ts('Value') }}</option>
  <option value="field">{{:: ts('Field') }}</option>
</select>
<crm-search-input ng-if="$ctrl.inputMode === 'value'" ng-model="$ctrl.filter.value" field="$ctrl.field" option-key="'name'" class="form-group"></crm-search-input>
<span ng-if="$ctrl.inputMode === 'field'">
  <input class="form-control" ng-model="$ctrl.filter.parent_field" crm-ui-select="{data: $ctrl.fieldsForFilter, placeholder: ts('Choose field')}">
</span>
