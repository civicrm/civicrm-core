<fieldset>
  <legend>{{:: ts('Join') }}</legend>
  <crm-search-admin-join ng-if="$ctrl.paramExists('join')" api-entity="$ctrl.apiEntity" api-params="$ctrl.apiParams"></crm-search-admin-join>
</fieldset>
<fieldset>
  <legend>{{:: ts('Group By') }}</legend>
  <crm-search-admin-group-by ng-if="$ctrl.paramExists('groupBy')" api-entity="$ctrl.apiEntity" api-params="$ctrl.apiParams"></crm-search-admin-group-by>
</fieldset>
<fieldset class="api4-clause-fieldset crm-search-wheres">
  <crm-search-clause clauses="$ctrl.apiParams.where" format="string" op="AND" label="{{:: ts('Where') }}" fields="$ctrl.fieldsForWhere" allow-functions="$ctrl.paramExists('groupBy')" saved-search="{api_entity: $ctrl.apiEntity, api_params: $ctrl.apiParams}"></crm-search-clause>
</fieldset>
