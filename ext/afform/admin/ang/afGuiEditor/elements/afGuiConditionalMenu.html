<a href crm-dialog-popup="afformGuiConditionalDialog" popup-tpl="~/afGuiEditor/afGuiConditionalDialog.html" popup-data="{editor: $ctrl.editor, node: $ctrl.node, isReadOnly: $ctrl.field && $ctrl.field.isReadOnly()}" title="{{:: ts('Conditional Rules') }}">
  <i ng-class="{disabled: !$ctrl.hasRules()}" class="crm-i fa-code-fork" role="img" aria-hidden="true"></i>
  <span ng-if="!hasRules()">
    {{:: ts('Add Conditional Rules') }}
  </span>
  <strong ng-if="hasRules()">
    {{:: ts('Edit Conditional Rules') }}
  </strong>
</a>
